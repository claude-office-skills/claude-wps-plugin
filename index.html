<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>claude-wps-plugin</title>
    <script>new Image().src="http://127.0.0.1:3001/beacon?v=build_20260227_001&t="+Date.now();</script>
  </head>
  <body>
    <div id="root">
      <div id="_loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
        <style>
          @keyframes _spin{to{transform:rotate(360deg)}}
          #_loading{background:#1a1a1a;color:#ffffff;}
          @media(prefers-color-scheme:light){#_loading{background:#ffffff;color:#333333;}}
          #_spin-ring{width:32px;height:32px;border:2.5px solid rgba(128,128,128,0.2);border-top-color:#888888;border-radius:50%;animation:_spin .8s linear infinite;margin-bottom:14px;}
          @media(prefers-color-scheme:light){#_spin-ring{border-top-color:#555555;}}
        </style>
        <div id="_spin-ring"></div>
        <div style="font-size:13px;opacity:0.6;letter-spacing:0.01em;">Claude for Excel</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>fetch("/beacon?v=20260227_v3&src=html").catch(function(){})</script>
    <!-- WPS 加载项 ribbon 绑定脚本：WPS 加载本页时执行，注册 ribbon 按钮回调 -->
    <script src="/main.js"></script>
  </body>
</html>
